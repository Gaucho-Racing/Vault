name: vault

services:
  kerbecs:
    container_name: vault-kerbecs
    image: bk1031/kerbecs:latest
    restart: always
    ports:
      - "10310:10310"
    volumes:
      - ./kerbecs.yaml:/etc/kerbecs/kerbecs.yaml:ro
    environment:
      KERBECS_CONFIG: /etc/kerbecs/kerbecs.yaml
    depends_on:
      - vault

  vault:
    container_name: vault-vault
    build:
      context: ./vault
      dockerfile: Dockerfile.dev
    restart: always
    working_dir: /app
    volumes:
      - ./vault:/app
      - vault_gopath:/go
    depends_on:
      - db
    environment:
      ENV: DEV
      PORT: 9999
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: vault
      VAULT_MASTER_KEY: ${VAULT_MASTER_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      VAULT_MASTER_KEY_ID: ${VAULT_MASTER_KEY_ID:-local-dev}

  db:
    container_name: vault-db
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: vault
    volumes:
      - pgdata:/var/lib/postgresql

volumes:
  pgdata:
  vault_gopath:
