name: vault

services:
  kerbecs:
    container_name: vault-kerbecs
    image: bk1031/kerbecs:latest
    restart: always
    ports:
      - "10310:10310"
    volumes:
      - ./kerbecs.yaml:/etc/kerbecs/kerbecs.yaml:ro
    environment:
      KERBECS_CONFIG: /etc/kerbecs/kerbecs.yaml
    depends_on:
      - vault

  vault:
    container_name: vault-vault
    build:
      context: ./vault
      dockerfile: Dockerfile.dev
    restart: always
    working_dir: /app
    volumes:
      - ./vault:/app
      - vault_gopath:/go
    depends_on:
      - db
    environment:
      ENV: DEV
      PORT: 9999
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: vault
      SENTINEL_URL: ${SENTINEL_URL:-https://sentinel-v5.gauchoracing.com}
      SKIP_AUTH_CHECK: ${SKIP_AUTH_CHECK:-true}

  db:
    container_name: vault-db
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: vault
    volumes:
      - pgdata:/var/lib/postgresql

volumes:
  pgdata:
  vault_gopath:
