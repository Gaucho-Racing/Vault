name: vault

services:
  kerbecs:
    container_name: vault-kerbecs
    image: bk1031/kerbecs:latest
    restart: always
    ports:
      - "10310:10310"
    volumes:
      - ./kerbecs.yaml:/etc/kerbecs/kerbecs.yaml:ro
    environment:
      KERBECS_CONFIG: /etc/kerbecs/kerbecs.yaml
    depends_on:
      - vault
      - web

  vault:
    container_name: vault-vault
    build:
      context: ./vault
      dockerfile: Dockerfile.dev
    restart: always
    working_dir: /app
    volumes:
      - ./vault:/app
      - vault_gopath:/go
    depends_on:
      - db
    environment:
      ENV: DEV
      PORT: 9999
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: vault
      SENTINEL_URL: ${SENTINEL_URL}
      SENTINEL_CLIENT_ID: ${SENTINEL_CLIENT_ID}
      SENTINEL_CLIENT_SECRET: ${SENTINEL_CLIENT_SECRET}
      SENTINEL_SA_TOKEN: ${SENTINEL_SA_TOKEN}

  web:
    container_name: vault-web
    image: node:22-alpine
    restart: always
    working_dir: /app
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:10310

  db:
    container_name: vault-db
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: vault
    volumes:
      - pgdata:/var/lib/postgresql

volumes:
  pgdata:
  vault_gopath:
  web_node_modules:
