name: Export Vault App Secrets
description: Export Vault app secrets into the current GitHub Actions job environment.
inputs:
  vault_url:
    description: Base URL for the Vault API.
    required: true
  secrets:
    description: Newline or comma separated app secret selectors to export.
    required: true
  audience:
    description: Expected OIDC audience configured by Vault.
    required: false
    default: gaucho-racing-vault
runs:
  using: composite
  steps:
    - shell: bash
      env:
        VAULT_URL: ${{ inputs.vault_url }}
        VAULT_SECRETS: ${{ inputs.secrets }}
        VAULT_AUDIENCE: ${{ inputs.audience }}
      run: |
        set +x
        set -euo pipefail

        if [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
          echo "GitHub OIDC token request variables are unavailable. Grant this job permissions.id-token: write." >&2
          exit 1
        fi

        if [ -z "${GITHUB_ENV:-}" ]; then
          echo "GITHUB_ENV is unavailable." >&2
          exit 1
        fi

        encoded_audience="$(jq -nr --arg value "$VAULT_AUDIENCE" '$value|@uri')"
        oidc_response="$(curl -fsS \
          -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${encoded_audience}")"
        oidc_token="$(jq -r '.value // empty' <<< "$oidc_response")"

        if [ -z "$oidc_token" ]; then
          echo "GitHub OIDC response did not include a token." >&2
          exit 1
        fi

        requested_secrets="$(
          jq -Rsc '[split("\n")[] | split(",")[] | gsub("^\\s+|\\s+$"; "") | select(length > 0)]' <<< "$VAULT_SECRETS"
        )"

        if [ "$requested_secrets" = "[]" ]; then
          echo "At least one Vault app secret selector is required." >&2
          exit 1
        fi

        payload="$(jq -n --arg token "$oidc_token" --argjson secrets "$requested_secrets" '{token: $token, secrets: $secrets}')"
        curl -fsS \
          -X POST \
          -H "Content-Type: application/json" \
          --data "$payload" \
          "${VAULT_URL%/}/integrations/github/actions/env" >> "$GITHUB_ENV"
